<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown File Browser</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 48px;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2d2d44;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }

        .sidebar.collapsed .sidebar-title span {
            display: none;
        }

        .sidebar.collapsed .path-input,
        .sidebar.collapsed .drives-section,
        .sidebar.collapsed .file-list {
            display: none;
        }

        .sidebar.collapsed .sidebar-title {
            justify-content: center;
        }

        .sidebar.collapsed .sidebar-title span {
            display: none;
        }

        .sidebar.collapsed .path-input,
        .sidebar.collapsed .drives-section,
        .sidebar.collapsed .file-list {
            display: none;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .toggle-btn:hover {
            background: #2d2d44;
            color: white;
        }

        .path-input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            background: #2d2d44;
            color: white;
            font-size: 13px;
            font-family: 'Consolas', monospace;
        }

        .path-input:focus {
            outline: none;
            background: #3d3d54;
        }

        .drives-section {
            padding: 12px 16px;
            border-bottom: 1px solid #2d2d44;
        }

        .drives-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .drives-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .drive-btn {
            padding: 6px 12px;
            background: #2d2d44;
            border: none;
            border-radius: 4px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .drive-btn:hover {
            background: #667eea;
            color: white;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .file-item:hover {
            background: #2d2d44;
        }

        .file-item.active {
            background: #667eea;
        }

        .file-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .file-icon.dir { color: #ffd700; }
        .file-icon.md { color: #667eea; }

        .file-name {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 11px;
            color: #888;
            margin-left: 8px;
        }

        .file-item.active .file-size {
            color: rgba(255,255,255,0.7);
        }

        .parent-btn {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #2d2d44;
            transition: background 0.15s;
        }

        .parent-btn:hover {
            background: #2d2d44;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #666;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: flex-basis 0.3s ease;
        }

        .content-header {
            padding: 12px 24px;
            background: white;
            border-bottom: 1px solid #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-file {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f5f5f5;
        }

        .action-btn.primary {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .action-btn.primary:hover {
            background: #5a6fd6;
        }

        .markdown-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            background: white;
        }

        .markdown-content {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 16px;
            color: #2c3e50;
            transition: max-width 0.3s ease;
        }

        .sidebar.collapsed + .main-content .markdown-content {
            max-width: none;
        }

        .markdown-content h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #1a1a2e;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .markdown-content h2 {
            font-size: 24px;
            margin-top: 28px;
            margin-bottom: 14px;
            color: #2c3e50;
        }

        .markdown-content h3 {
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #34495e;
        }

        .markdown-content p {
            margin-bottom: 14px;
        }

        .markdown-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: #e74c3c;
        }

        .markdown-content pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 16px 0;
        }

        /* Mermaid code blocks - light background for proper rendering */
        .markdown-content pre.mermaid,
        .markdown-content pre.mermaid-pre,
        .markdown-content pre:has(code.language-mermaid),
        .markdown-content pre:has(code[class*="mermaid"]) {
            background: #fafbfc !important;
            padding: 20px;
            border-radius: 8px;
        }

        .markdown-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 14px 0;
            padding-left: 28px;
        }

        .markdown-content li {
            margin-bottom: 6px;
        }

        .markdown-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 16px;
            margin: 16px 0;
            color: #7f8c8d;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .markdown-content th, .markdown-content td {
            border: 1px solid #ddd;
            padding: 10px 12px;
            text-align: left;
        }

        .markdown-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .markdown-content tr:nth-child(even) {
            background: #fafafa;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: #888;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .welcome-text {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .welcome-hint {
            font-size: 14px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            color: #e74c3c;
            padding: 20px;
            background: #fef5f5;
            border-radius: 6px;
            margin: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .sidebar ::-webkit-scrollbar-track {
            background: #2d2d44;
        }

        .sidebar ::-webkit-scrollbar-thumb {
            background: #4d4d64;
        }

        /* Mermaid diagram styling */
        .mermaid {
            margin: 24px 0;
            text-align: center;
            overflow-x: auto;
            max-width: 100%;
            background: #fafbfc;
            padding: 20px;
            border-radius: 8px;
        }

        .mermaid svg {
            max-width: 100%;
            height: auto;
            background: transparent !important;
        }

        .mermaid-error {
            margin: 8px 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <span>📂 Markdown 文件浏览器</span>
                <button class="toggle-btn" id="toggleSidebar" title="切换侧边栏">◀</button>
            </div>
            <input type="text" class="path-input" id="pathInput" placeholder="输入目录路径..." />
        </div>
        <div class="drives-section">
            <div class="drives-label">快速访问</div>
            <div class="drives-list" id="drivesList"></div>
        </div>
        <div class="file-list" id="fileList">
            <div class="empty-state">请输入目录路径</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="content-header" id="contentHeader">
            <div class="current-file" id="currentFile">未选择文件</div>
            <div class="header-actions">
                <button class="action-btn" onclick="copyPath()">复制路径</button>
                <a class="action-btn primary" id="presentationLink" href="presentation.html">切换到演示模式</a>
            </div>
        </div>
        <div class="markdown-container" id="markdownContainer">
            <div class="welcome-screen">
                <div class="welcome-icon">📄</div>
                <div class="welcome-text">选择一个 Markdown 文件查看</div>
                <div class="welcome-hint">在左侧浏览目录并点击 .md 文件</div>
            </div>
        </div>
    </div>

    <script>
        let currentPath = '';
        let currentFile = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDrives();
            setupEventListeners();
            initSidebar();
        });

        function setupEventListeners() {
            const pathInput = document.getElementById('pathInput');
            pathInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    browseDirectory(pathInput.value);
                }
            });

            // 侧边栏折叠切换
            const toggleBtn = document.getElementById('toggleSidebar');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggleSidebar);
            }
        }

        function initSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
            }
            
            updateToggleButton();
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
            updateToggleButton();
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        function updateToggleButton() {
            const toggleBtn = document.getElementById('toggleSidebar');
            const sidebar = document.querySelector('.sidebar');
            if (sidebar.classList.contains('collapsed')) {
                toggleBtn.innerHTML = '▶';
            } else {
                toggleBtn.innerHTML = '◀';
            }
        }

        async function loadDrives() {
            try {
                const res = await fetch('/api/drives');
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const drives = await res.json();
                const container = document.getElementById('drivesList');
                container.innerHTML = drives.map(d => 
                    `<button class="drive-btn" onclick="browseDirectory('${escapeHtml(d.path)}')">${d.name}</button>`
                ).join('');
            } catch (e) {
                console.error('Failed to load drives:', e);
            }
        }

        async function browseDirectory(path) {
            currentPath = path;
            document.getElementById('pathInput').value = path;

            try {
                const res = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                const data = await res.json();

                renderFileList(data);
            } catch (e) {
                document.getElementById('fileList').innerHTML = 
                    `<div class="error">无法访问目录: ${e.message}</div>`;
            }
        }

        function renderFileList(data) {
            const container = document.getElementById('fileList');
            let html = '';

            // Parent directory
            if (data.parent) {
                html += `
                    <div class="parent-btn" onclick="browseDirectory('${escapeHtml(data.parent)}')">
                        <span class="file-icon dir">📁</span>
                        <span class="file-name">..</span>
                    </div>
                `;
            }

            if (data.items.length === 0) {
                html += '<div class="empty-state">此目录没有 Markdown 文件</div>';
            } else {
                // Directories first, then files
                const dirs = data.items.filter(i => i.type === 'directory');
                const files = data.items.filter(i => i.type === 'file');

                dirs.forEach(item => {
                    html += `
                        <div class="file-item" onclick="browseDirectory('${escapeHtml(item.path)}')">
                            <span class="file-icon dir">📁</span>
                            <span class="file-name">${escapeHtml(item.name)}</span>
                        </div>
                    `;
                });

                files.forEach(item => {
                    const isActive = currentFile && currentFile.path === item.path;
                    html += `
                        <div class="file-item ${isActive ? 'active' : ''}" onclick="loadFile('${escapeHtml(item.path)}')">
                            <span class="file-icon md">📄</span>
                            <span class="file-name">${escapeHtml(item.name)}</span>
                            <span class="file-size">${formatSize(item.size)}</span>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
        }

        async function loadFile(path) {
            try {
                const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                const data = await res.json();

                currentFile = data;

                // Update header
                document.getElementById('currentFile').textContent = data.name;

                // Render markdown
                const container = document.getElementById('markdownContainer');
                container.innerHTML = `<div class="markdown-content">${marked.parse(data.content)}</div>`;
                
                // Render Mermaid diagrams
                renderMermaidDiagrams();

                // Update active state in file list
                document.querySelectorAll('.file-item').forEach(el => {
                    el.classList.remove('active');
                });

            } catch (e) {
                document.getElementById('markdownContainer').innerHTML = 
                    `<div class="error">无法读取文件: ${e.message}</div>`;
            }
        }

        function copyPath() {
            if (currentFile) {
                navigator.clipboard.writeText(currentFile.path);
                alert('路径已复制: ' + currentFile.path);
            } else {
                alert('请先选择一个文件');
            }
        }

        function escapeHtml(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        /**
         * Render all Mermaid diagrams on the page
         * Call this after marked.js has rendered markdown content
         */
        async function renderMermaidDiagrams() {
            // Check if mermaid is available
            if (typeof mermaid === 'undefined') {
                console.warn('Mermaid.js not loaded, skipping diagram rendering');
                return;
            }
            
            // Initialize mermaid (only once)
            if (!mermaid._hasInitialized) {
                try {
                    await mermaid.initialize({
                        startOnLoad: false,
                        theme: 'base',
                        themeVariables: {
                            background: '#fafbfc',
                            primaryColor: '#667eea',
                            primaryTextColor: '#333',
                            primaryBorderColor: '#667eea',
                            lineColor: '#666',
                            secondaryColor: '#f0f4ff',
                            tertiaryColor: '#fff',
                            noteBkgColor: '#fff5e6',
                            noteTextColor: '#333',
                            noteBorderColor: '#e6a700'
                        },
                        securityLevel: 'loose',
                        logLevel: 'error',
                    });
                    mermaid._hasInitialized = true;
                } catch (error) {
                    console.error('Failed to initialize Mermaid:', error);
                    return;
                }
            }
            
            // Find all mermaid code blocks and prepare their parent pre elements
            const mermaidBlocks = document.querySelectorAll('.mermaid, .language-mermaid, pre code[class*="mermaid"]');
            
            if (mermaidBlocks.length === 0) {
                return; // No diagrams to render
            }
            
            // Pre-process: add class to parent pre elements for styling
            mermaidBlocks.forEach(block => {
                const pre = block.closest('pre');
                if (pre) {
                    pre.classList.add('mermaid-pre');
                }
            });
            
            // Render each diagram
            try {
                await mermaid.init(undefined, mermaidBlocks);
                console.log(`Rendered ${mermaidBlocks.length} Mermaid diagram(s)`);
            } catch (error) {
                console.error('Error rendering Mermaid diagrams:', error);
                // Show fallback: keep code blocks visible with error indicator
                mermaidBlocks.forEach(block => {
                    const pre = block.closest('pre');
                    if (pre) {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'mermaid-error';
                        errorMsg.style.cssText = 'color: #e74c3c; padding: 8px; background: #fef5f5; border-radius: 4px; margin-top: 8px; font-size: 12px;';
                        errorMsg.textContent = '⚠️ Diagram rendering failed - check browser console for details';
                        pre.parentNode.insertBefore(errorMsg, pre.nextSibling);
                    }
                });
            }
        }
    </script>
</body>
</html>

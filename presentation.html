<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Presentation</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slide-container {
            width: 100%;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .slide-header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-title {
            font-size: 18px;
            font-weight: 600;
        }

        .slide-counter {
            font-size: 14px;
            opacity: 0.9;
        }

        .content-area {
            flex: 1;
            padding: 24px 40px;
            overflow-y: auto;
            background: #fafbfc;
        }

        .markdown-content {
            max-width: 100%;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 17px;
            color: #2c3e50;
        }

        .markdown-content h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #1a1a2e;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .markdown-content h2 {
            font-size: 24px;
            margin-top: 28px;
            margin-bottom: 14px;
            color: #2c3e50;
        }

        .markdown-content h3 {
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #34495e;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content code {
            background: #f4f4f4;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 16px;
            color: #e74c3c;
        }

        .markdown-content pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 16px 0;
            padding-left: 32px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #7f8c8d;
            font-style: italic;
        }

        .button-area {
            padding: 6px 16px;
            background: #ffffff;
            border-top: 1px solid #e1e4e8;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .execute-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .execute-btn.prompt-btn {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .execute-btn.result-btn {
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .execute-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .execute-btn:active {
            transform: translateY(0);
        }

        .execute-btn.active {
            box-shadow: 0 0 0 1px rgba(102, 126, 234, 0.5);
        }

        .nav-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .divider {
            width: 1px;
            height: 24px;
            background: #e1e4e8;
        }

        .loading {
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 40px;
        }

        .mode-indicator {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            z-index: 1000;
        }

        .mode-indicator.server-mode {
            background: rgba(17, 153, 142, 0.9);
        }

        .mode-indicator.inline-mode {
            background: rgba(231, 76, 60, 0.9);
        }

        /* Mermaid diagram styling */
        .mermaid {
            margin: 24px 0;
            text-align: center;
            overflow-x: auto;
            max-width: 100%;
        }

        .mermaid svg {
            max-width: 100%;
            height: auto;
        }

        .mermaid-error {
            margin: 8px 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="slide-header">
            <div class="slide-title" id="slideTitle">Architecture Analysis & Updates</div>
            <div class="slide-counter">Page <span id="currentPage">1</span> / 3</div>
        </div>
        <div class="content-area">
            <div id="markdownContent" class="markdown-content">
                <div class="loading">Loading...</div>
            </div>
        </div>
        <div class="button-area">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">← Prev</button>
            <div class="divider"></div>
            <button class="execute-btn prompt-btn active" id="promptBtn" onclick="showPrompt()">Prompt</button>
            <button class="execute-btn result-btn" id="resultBtn" onclick="showResult()">Result</button>
            <div class="divider"></div>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">Next →</button>
            <div class="divider"></div>
            <a href="browser.html" class="nav-btn" style="text-decoration:none;">📂 浏览文件</a>
        </div>
    </div>

    <div id="modeIndicator" class="mode-indicator">Loading...</div>

    <script>
        // Page titles for each slide
        const PAGE_TITLES = {
            1: 'Architecture Analysis & Updates',
            2: 'Business Code Generation',
            3: 'Development Summary'
        };

        // ============================================
        // INLINE MARKDOWN CONTENT (edit these directly)
        // ============================================
        const INLINE_CONTENT = {
            '1_prompt': `# 架构文档生成指南

## 第一部分：使用场景

以下两种场景适合使用 AI 辅助生成或更新架构文档：

### 1. 从零创建架构文档

项目当前没有任何架构文档，需要基于现有代码库从零开始补充：

- 新接手的项目缺少文档传承
- 快速迭代期未及时记录架构设计
- 需要为团队建立统一的架构认知基线

此时应使用**第二部分**的提示词，让 AI 分析代码库并生成完整的架构文档。

### 2. 更新现有架构文档

项目已有架构文档，但存在以下问题：

- 文档内容过于笼统，缺少关键细节
- 随着项目持续开发，文档已落后于实际代码
- 新增模块或重构后文档未同步更新

此时应使用**第三部分**的提示词，让 AI 对比现有文档与当前代码，生成更新后的版本。

---

\`\`\`

3. **模块与组件架构** - 识别核心模块和依赖关系
4. **数据层** - 数据库、ORM、实体、关系

## 第三部分：更新现有架构文档

\`\`\`
你是一位资深软件架构师。分析后端代码库，并更新现有架构文档。

## 现有文档
[在此粘贴现有文档]

## 任务要求
1. **识别变更** - 新增/移除/修改的组件
2. **更新各章节** - 标记为 ✅/⚠️/❌ 并更新
3. **保持一致性** - 保留结构和术语
4. **标记破坏性变更** - 明确说明影响和迁移路径

## 输出格式
包含变更日志摘要表格和完整更新后的文档。
\`\`\`

---

## 最佳实践

1. **提供足够的上下文**：包含相关的代码文件或文件路径
2. **迭代优化**：先进行广泛分析，再深入具体领域
3. **验证输出**：对照实际代码审查 AI 生成的文档
4. **持续维护**：将定期文档更新纳入开发周期`,
            '1_result': `# 架构文档示例输出

            '3_prompt': `# Prompt 3: System Architecture Question

        let currentSlide = 1;
        let currentView = 'prompt'; // 'prompt' or 'result'
        let useInlineMode = false;

        async function loadMarkdown(type) {
            const filename = `${currentSlide}_${type}.md`;
            const contentDiv = document.getElementById('markdownContent');
            
            // If already in inline mode, use inline content directly
            if (useInlineMode) {
                const key = `${currentSlide}_${type}`;
                const text = INLINE_CONTENT[key] || `# Content not found\n\nKey: ${key}`;
                contentDiv.innerHTML = marked.parse(text);
                renderMermaidDiagrams();
                return;
            }
            
            try {
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const text = await response.text();
                contentDiv.innerHTML = marked.parse(text);
                renderMermaidDiagrams();
                updateModeIndicator(false);
            } catch (error) {
                // Fallback to inline mode (file:// protocol blocks fetch)
                useInlineMode = true;
                console.log('Fetch failed, switching to inline mode');
                const key = `${currentSlide}_${type}`;
                const text = INLINE_CONTENT[key] || `# Content not found\n\nKey: ${key}`;
                contentDiv.innerHTML = marked.parse(text);
                renderMermaidDiagrams();
                updateModeIndicator(true);
            }
        }

        function updateModeIndicator(isInline) {
            const indicator = document.getElementById('modeIndicator');
            if (isInline) {
                indicator.className = 'mode-indicator inline-mode';
                indicator.textContent = '📄 Inline Mode (edit INLINE_CONTENT in HTML)';
            } else {
                indicator.className = 'mode-indicator server-mode';
                indicator.textContent = '🌐 Server Mode (loading from .md files)';
            }
        }

        function showPrompt() {
            currentView = 'prompt';
            updateButtonStyles();
            loadMarkdown('prompt');
        }

        function showResult() {
            currentView = 'result';
            updateButtonStyles();
            loadMarkdown('result');
        }

        function updateButtonStyles() {
            const promptBtn = document.getElementById('promptBtn');
            const resultBtn = document.getElementById('resultBtn');
            
            if (currentView === 'prompt') {
                promptBtn.classList.add('active');
                resultBtn.classList.remove('active');
            } else {
                promptBtn.classList.remove('active');
                resultBtn.classList.add('active');
            }
        }

        function updateSlide() {
            document.getElementById('currentPage').textContent = currentSlide;
            document.getElementById('slideTitle').textContent = PAGE_TITLES[currentSlide];
            document.getElementById('prevBtn').disabled = currentSlide === 1;
            document.getElementById('nextBtn').disabled = currentSlide === 3;
            
            // Reset to prompt view when changing slides
            currentView = 'prompt';
            updateButtonStyles();
            loadMarkdown('prompt');
        }

        function prevSlide() {
            if (currentSlide > 1) {
                currentSlide--;
                updateSlide();
            }
        }

        function nextSlide() {
            if (currentSlide < 3) {
                currentSlide++;
                updateSlide();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'p' || e.key === 'P') {
                showPrompt();
            } else if (e.key === 'r' || e.key === 'R') {
                showResult();
            }
        });

        /**
         * Render all Mermaid diagrams on the page
         * Call this after marked.js has rendered markdown content
         */
        async function renderMermaidDiagrams() {
            // Check if mermaid is available
            if (typeof mermaid === 'undefined') {
                console.warn('Mermaid.js not loaded, skipping diagram rendering');
                return;
            }
            
            // Initialize mermaid (only once)
            if (!mermaid._hasInitialized) {
                try {
                    await mermaid.initialize({
                        startOnLoad: false,
                        theme: 'default',
                        securityLevel: 'loose',
                        logLevel: 'error',
                    });
                    mermaid._hasInitialized = true;
                } catch (error) {
                    console.error('Failed to initialize Mermaid:', error);
                    return;
                }
            }
            
            // Find all mermaid code blocks
            const mermaidBlocks = document.querySelectorAll('.mermaid, .language-mermaid, pre code[class*="mermaid"]');
            
            if (mermaidBlocks.length === 0) {
                return; // No diagrams to render
            }
            
            // Render each diagram
            try {
                await mermaid.init(undefined, mermaidBlocks);
                console.log(`Rendered ${mermaidBlocks.length} Mermaid diagram(s)`);
            } catch (error) {
                console.error('Error rendering Mermaid diagrams:', error);
                // Show fallback: keep code blocks visible with error indicator
                mermaidBlocks.forEach(block => {
                    const pre = block.closest('pre');
                    if (pre) {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'mermaid-error';
                        errorMsg.style.cssText = 'color: #e74c3c; padding: 8px; background: #fef5f5; border-radius: 4px; margin-top: 8px; font-size: 12px;';
                        errorMsg.textContent = '⚠️ Diagram rendering failed - check browser console for details';
                        pre.parentNode.insertBefore(errorMsg, pre.nextSibling);
                    }
                });
            }
        }

        // Initialize
        updateSlide();
    </script>
</body>
</html>
